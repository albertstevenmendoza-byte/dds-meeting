.board-container { display:grid; grid-template-columns:repeat(auto-fill,minmax(390px,1fr)); gap:28px; }

/* Card */
.pretty-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; overflow:hidden;
  box-shadow:var(--shadow-sm);
  transition:transform .35s var(--spring),box-shadow .35s;
  position:relative;
}
.pretty-card:hover { transform:translateY(-5px); box-shadow:var(--shadow-lg); }
.pretty-card.theme-dark { color:white; }
.pretty-card.theme-dark .card-body  { color:rgba(255,255,255,.92); }
.pretty-card.theme-dark .card-footer{ background:rgba(0,0,0,.08); color:rgba(255,255,255,.55); }

.card-image-wrap { width:100%; height:210px; background:var(--surface2); overflow:hidden; }
.card-image-wrap img { width:100%; height:100%; object-fit:cover; transition:.5s; }
.pretty-card:hover .card-image-wrap img { transform:scale(1.03); }

.admin-toolbar { position:absolute; top:10px; left:10px; right:10px; display:flex; gap:5px; opacity:0; transition:.25s; z-index:10; }
.pretty-card:hover .admin-toolbar { opacity:1; }
.tool-btn {
  background:rgba(255,255,255,.94); backdrop-filter:blur(8px);
  border:1px solid rgba(0,0,0,.06); padding:5px 10px; border-radius:7px;
  font-size:.68rem; font-weight:800; cursor:pointer; color:var(--ink2); transition:.15s;
}
.tool-btn:hover { background:var(--green); color:white; border-color:var(--green); }

.card-content { padding:26px 28px 20px; }
.badge { background:var(--green-xll); color:var(--green-d); border:1px solid var(--green-ll); padding:3px 10px; border-radius:6px; font-size:.62rem; font-weight:800; text-transform:uppercase; margin-bottom:12px; display:inline-block; letter-spacing:.05em; }
.card-body { font-size:1.05rem; min-height:80px; outline:none; white-space:pre-wrap; margin-bottom:20px; font-weight:500; line-height:1.65; color:var(--ink2); }
.card-controls { display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--border); padding-top:16px; }
.color-dots { display:flex; gap:10px; align-items:center; }
.dot { width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid var(--border2); transition:.18s; box-shadow:var(--shadow-xs); }
.dot:hover { transform:scale(1.25); }
.dot.active { border:3.5px solid var(--green) !important; transform:scale(1.12); box-shadow:0 0 0 2px white; }
.delete-btn { cursor:pointer; color:var(--border2); font-size:1rem; transition:.18s; }
.delete-btn:hover { color:var(--red-l); }
.card-footer { padding:11px 28px; font-size:.7rem; color:var(--ink4); font-weight:600; border-top:1px solid var(--border); }

/* Skeleton */
.skeleton-card { height:380px; border-radius:20px; }

/* Gallery modal */
.gallery-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); backdrop-filter:blur(10px); display:none; place-items:center; z-index:2000; padding:20px; }
.gallery-overlay.active { display:grid; }
.gallery-window { background:var(--surface); width:100%; max-width:820px; padding:32px; border-radius:24px; box-shadow:var(--shadow-lg); }
.gallery-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; }
.gallery-header h2 { font-size:1.25rem; font-weight:800; color:var(--ink); }
.gallery-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:14px; }
.gallery-item { width:100%; height:120px; object-fit:cover; border-radius:14px; cursor:pointer; border:3px solid transparent; transition:.18s; }
.gallery-item:hover { border-color:var(--green); transform:translateY(-3px); box-shadow:var(--shadow); }

<script>
  const PROF_PRESETS=[
    'https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=800&q=80',
    'https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=800&q=80',
    'https://images.unsplash.com/photo-1553413077-190dd305871c?auto=format&fit=crop&w=800&q=80',
    'https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=800&q=80',
    'https://images.unsplash.com/photo-1565061828021-dd353ba0a1b7?auto=format&fit=crop&w=800&q=80',
    'https://images.unsplash.com/photo-1521737711867-e3b97375f902?auto=format&fit=crop&w=800&q=80',
  ];
  const THEME_COLORS=['#ffffff','#e0f2fe','#dcfce7','#fef3c7','#fee2e2','#f3e8ff','#ccfbf1','#fce7f3'];

  function checkAdmin(){try{const u=JSON.parse(sessionStorage.getItem('novus1730_user'));return u&&u.role==='admin';}catch(e){return false;}}
  const isAdmin=checkAdmin();
  if(isAdmin)document.getElementById('main-body').classList.add('is-admin');

  function showSync(){document.getElementById('sync-badge').classList.add('on');}
  function hideSync(){setTimeout(()=>document.getElementById('sync-badge').classList.remove('on'),900);}
  function parseStyle(s){const p=(s||'').split('|');return{bg:p[0]||'#ffffff',align:p[1]||'left',theme:p[2]||'light'};}

  async function loadData(){
    const{data,error}=await NovusDB.announcements.getAll();
    if(error){console.error(error);return;}
    const container=document.getElementById('board');
    if(!data.length){container.innerHTML='<p style="color:var(--ink4);padding:20px;">No announcements yet.</p>';return;}
    container.innerHTML=data.map(item=>{
      const style=parseStyle(item.color);
      return`<div class="pretty-card theme-${style.theme}" id="card-${item.id}" style="background-color:${style.bg}" data-raw-style="${item.color}">
        <div class="admin-toolbar admin-only">
          <button class="tool-btn" onclick="openGallery('${item.id}')">🖼️ Image</button>
          <button class="tool-btn" onclick="updateStyle('${item.id}','align','left')">Left</button>
          <button class="tool-btn" onclick="updateStyle('${item.id}','align','center')">Center</button>
          <button class="tool-btn" onclick="updateStyle('${item.id}','theme','${style.theme==='light'?'dark':'light'}')">🌓 Mode</button>
        </div>
        <div class="card-image-wrap"><img src="${item.image||PROF_PRESETS[0]}" id="img-${item.id}" alt="cover"></div>
        <div class="card-content">
          <span class="badge">Announcement ${item.number}</span>
          <div class="card-body" id="body-${item.id}" style="text-align:${style.align}" contenteditable="${isAdmin}" onblur="updateField('${item.id}','text',this.innerText.trim())">${item.text}</div>
          <div class="card-controls">
            <div class="color-dots admin-only">
              ${THEME_COLORS.map(c=>`<div class="dot${style.bg.toLowerCase()===c.toLowerCase()?' active':''}" style="background:${c}" data-color="${c}" onclick="updateStyle('${item.id}','bg','${c}')"></div>`).join('')}
            </div>
            ${isAdmin?`<span class="delete-btn" onclick="deleteItem('${item.id}')">🗑️</span>`:''}
          </div>
        </div>
        <div class="card-footer">${item.date}</div>
      </div>`;
    }).join('');
  }

  async function updateField(id,field,value){
    if(!isAdmin)return; showSync();
    await NovusDB.announcements.updateField(id,field,value);
    hideSync();
  }
  async function updateStyle(id,prop,val){
    if(!isAdmin)return;
    const card=document.getElementById(`card-${id}`),body=document.getElementById(`body-${id}`);
    const style=parseStyle(card.getAttribute('data-raw-style'));
    style[prop]=val;
    if(prop==='bg'){card.style.backgroundColor=val;card.querySelectorAll('.dot').forEach(d=>d.classList.toggle('active',d.getAttribute('data-color')===val));}
    if(prop==='align')body.style.textAlign=val;
    if(prop==='theme'){card.classList.remove('theme-light','theme-dark');card.classList.add(`theme-${val}`);}
    const newStr=`${style.bg}|${style.align}|${style.theme}`;
    card.setAttribute('data-raw-style',newStr);
    await updateField(id,'color',newStr);
  }
  async function addItem(){
    if(!isAdmin)return; showSync();
    const newItem={id:Date.now().toString(),number:document.querySelectorAll('.pretty-card').length+1,text:'New update — click to edit this message…',date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),image:PROF_PRESETS[0],color:'#ffffff|left|light'};
    await NovusDB.announcements.add(newItem);
    hideSync();
  }
  async function deleteItem(id){
    if(!confirm('Delete globally?'))return; showSync();
    await NovusDB.announcements.delete(id);
    hideSync();
  }
  let activeCardId=null;
  function openGallery(id){activeCardId=id;document.getElementById('galleryGrid').innerHTML=PROF_PRESETS.map(url=>`<img src="${url}" class="gallery-item" onclick="selectPreset('${url}')" alt="preset">`).join('');document.getElementById('galleryOverlay').classList.add('active');}
  function closeGallery(){document.getElementById('galleryOverlay').classList.remove('active');}
  async function selectPreset(url){document.getElementById(`img-${activeCardId}`).src=url;await updateField(activeCardId,'image',url);closeGallery();}
  function handleFileUpload(e){const file=e.target.files[0];const reader=new FileReader();reader.onload=async ev=>{document.getElementById(`img-${activeCardId}`).src=ev.target.result;await updateField(activeCardId,'image',ev.target.result);closeGallery();};reader.readAsDataURL(file);}

  window.onload=()=>{
    NovusCore.requireAuth();
    loadData();
    NovusDB.announcements.subscribe(()=>loadData());
  };
</script>
