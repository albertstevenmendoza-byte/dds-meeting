<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Rules of Engagement – Novus Foods Ops Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="novus-styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="novus-core.js"></script>
  <style>
    .page { padding-top:28px; }
    .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
    .page-title  { font-size:1.4rem; font-weight:800; color:var(--ink); }
    .page-sub    { font-size:.82rem; color:var(--ink3); margin-top:3px; }
    .board-container { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:18px; }
    .rule-card {
      background:var(--surface); border-radius:var(--radius); padding:22px 24px;
      border:1px solid var(--border); position:relative; box-shadow:var(--shadow-sm);
      transition:box-shadow .2s,border-color .2s;
    }
    .rule-card:hover { box-shadow:var(--shadow); border-color:var(--green-ll); }
    .rule-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--green-d),var(--green)); border-radius:var(--radius) var(--radius) 0 0; }
    .card-body { font-size:.95rem; min-height:75px; outline:none; line-height:1.65; white-space:pre-wrap; color:var(--ink2); }
    .card-body strong { color:var(--green-d); font-weight:800; }
    .card-footer { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; font-size:.68rem; color:var(--ink4); }
    .delete-btn { cursor:pointer; color:var(--border2); transition:.15s; }
    .delete-btn:hover { color:var(--red-l); }
    body:not(.is-admin) .admin-only { display:none !important; }
  </style>
</head>
<body id="main-body">
<div class="top-nav">
  <div class="logo"><div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M3 3h7v7H3zm0 11h7v7H3zm11-11h7v7h-7zm0 11h7v7h-7z"/></svg></div><span class="logo-text">Novus <span>Foods</span> Ops</span></div>
  <nav class="nav-tabs">
    <a class="nav-tab" href="dds-announcements.html">DDS Announcements</a>
    <a class="nav-tab" href="dds-dashboard.html">DDS Dashboard</a>
    <a class="nav-tab active" href="dds-rules.html">Rules of Engagement</a>
    <a class="nav-tab" href="dds-corevalues.html">Core Values</a>
    <a class="nav-tab" href="staff-meeting-dashboard.html">Customizable Dashboard</a>
    <a class="nav-tab" href="play-call.html">Play Call</a>
    <a class="nav-tab" href="needs-action.html">Needs Action</a>
  </nav>
  <button class="btn btn-ghost" style="font-size:.78rem;padding:6px 14px;" onclick="NovusCore.navigateTo('index.html')">Logout</button>
</div>
<div class="page">
  <div class="page-header">
    <div><h2 class="page-title">Rules of Engagement</h2><p class="page-sub">Standard protocols for daily operations meetings.</p></div>
    <button class="btn btn-teal admin-only" onclick="addItem()">+ Add Custom Rule</button>
  </div>
  <div class="board-container" id="board"><p style="color:var(--ink4);">Loading…</p></div>
</div>
<script>
  const DEFAULT_RULES=[{id:'1',text:'🚀 Punctuality: Meeting starts exactly on time. Be present 2 minutes early.',date:'System'},{id:'2',text:'📊 Preparation: Have your specific department metrics ready to discuss.',date:'System'},{id:'3',text:'🧠 Focus: No side conversations. Stay focused on the data and the "Why" behind the numbers.',date:'System'},{id:'4',text:'🛠️ Action Oriented: Identify gaps, assign owners, and set clear deadlines for recovery.',date:'System'},{id:'5',text:'🤝 Respect: One person speaks at a time. Keep updates concise (under 60 seconds).',date:'System'}];
  function checkAdmin(){try{const u=JSON.parse(sessionStorage.getItem('novus1730_user'));return u&&u.role==='admin';}catch(e){return false;}}
  const isAdmin=checkAdmin();if(isAdmin)document.getElementById('main-body').classList.add('is-admin');
  async function loadData(){const{data,error}=await NovusDB.rules.getAll();if(error){renderBoard(DEFAULT_RULES);return;}if(!data.length){if(isAdmin){for(const r of DEFAULT_RULES)await NovusDB.rules.add(r);loadData();return;}renderBoard(DEFAULT_RULES);return;}renderBoard(data);}
  function renderBoard(items){document.getElementById('board').innerHTML=items.map(item=>{const txt=item.text.replace(/^([^:]+:)/,'<strong>$1</strong>');return`<div class="rule-card"><div class="card-body" contenteditable="${isAdmin}" onblur="editItem('${item.id}',this.innerText)">${txt}</div><div class="card-footer"><span>RULE · ${item.date}</span>${isAdmin?`<span class="delete-btn" onclick="deleteItem('${item.id}')">🗑️</span>`:''}</div></div>`;}).join('');}
  async function addItem(){const text=prompt('New rule text:');if(!text)return;await NovusDB.rules.add({id:Date.now().toString(),text,date:new Date().toLocaleDateString()});}
  async function editItem(id,t){if(!isAdmin)return;await NovusDB.rules.update(id,t);}
  async function deleteItem(id){if(!confirm('Delete rule globally?'))return;await NovusDB.rules.delete(id);}
  window.onload=()=>{NovusCore.requireAuth();loadData();NovusDB.rules.subscribe(()=>loadData());};
</script>
</body>
</html>
