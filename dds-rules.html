<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>DDS Rules – Novus Foods Ops Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="novus-core.js"></script>

  <style>
    :root { --bg:#f4f6fb; --surface:#ffffff; --border:#e2e8f0; --ink:#0f172a; --blue:#2563eb; --teal:#0d9488; --radius:14px; }
    body { font-family:'DM Sans', sans-serif; background:var(--bg); color:var(--ink); margin: 0; }
    .top-nav { height:58px; background:white; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; padding:0 28px; position:sticky; top:0; z-index:200; }
    .logo { font-weight:700; } .logo span { color:var(--blue); }
    .nav-tabs { display:flex; gap:2px; background:var(--bg); padding:3px; border-radius:10px; }
    .nav-tab { padding:6px 14px; border-radius:7px; text-decoration:none; font-size:.8rem; font-weight:600; color:#64748b; }
    .nav-tab.active { background:white; color:var(--blue); box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .page { max-width:1400px; margin:0 auto; padding:40px 20px; }
    .header-flex { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .btn { padding:8px 16px; border-radius:8px; font-weight:600; cursor:pointer; border:none; }
    .btn-primary { background:var(--teal); color:white; }
    .board-container { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:20px; }
    .pretty-card { background:white; border-radius:var(--radius); padding:24px; border:1px solid var(--border); position:relative; transition: 0.2s; }
    .pretty-card::before { content:''; position:absolute; top:0; left:0; width:100%; height:4px; background:var(--teal); border-radius: var(--radius) var(--radius) 0 0; }
    .card-body { font-size:1rem; min-height:80px; outline:none; line-height:1.6; white-space: pre-wrap; }
    .card-body strong { color: var(--ink); font-weight: 800; }
    .card-footer { margin-top:15px; padding-top:15px; border-top:1px solid #f8fafc; display:flex; justify-content:space-between; align-items:center; font-size:0.7rem; color:#94a3b8; }
    .delete-btn { cursor:pointer; color:#94a3b8; opacity:0.3; transition:0.2s; } .delete-btn:hover { color:#ef4444; opacity:1; }
    body:not(.is-admin) .admin-only { display:none !important; }
  </style>
</head>
<body id="main-body">

<div class="top-nav">
  <div class="logo">Novus <span>Foods</span> Ops</div>
  <nav class="nav-tabs">
    <a class="nav-tab" href="dds-announcements.html">DDS Announcements</a>
    <a class="nav-tab" href="dds-dashboard.html">DDS Dashboard</a>
    <a class="nav-tab active" href="dds-rules.html">Rules of Engagement</a>
    <a class="nav-tab" href="dds-corevalues.html">Core Values</a>
    <a class="nav-tab" href="staff-meeting-dashboard.html">Customizable Dashboard</a>
    <a class="nav-tab" href="play-call.html">Play Call</a>
    <a class="nav-tab" href="needs-action.html">Needs Action</a>
  </nav>
  <button class="btn" onclick="NovusCore.navigateTo('index.html')">Logout</button>
</div>

<div class="page">
  <div class="header-flex">
    <div>
      <h2 style="font-size:1.2rem; font-weight:700;">Rules of Engagement</h2>
      <p style="font-size:0.8rem; color:#64748b;">Standard protocols for daily operations meetings.</p>
    </div>
    <button class="btn btn-primary admin-only" onclick="addItem()">+ Add Custom Rule</button>
  </div>
  <div class="board-container" id="board">Loading...</div>
</div>

<script>
  const DEFAULT_RULES = [
    { id:'1', text:'🚀 Punctuality: Meeting starts exactly on time. Be present 2 minutes early.', date:'System' },
    { id:'2', text:'📊 Preparation: Have your specific department metrics ready to discuss.', date:'System' },
    { id:'3', text:'🧠 Focus: No side conversations. Stay focused on the data and the "Why" behind the numbers.', date:'System' },
    { id:'4', text:'🛠️ Action Oriented: Identify gaps, assign owners, and set clear deadlines for recovery.', date:'System' },
    { id:'5', text:'🤝 Respect: One person speaks at a time. Keep updates concise (under 60 seconds).', date:'System' },
  ];

  function checkAdmin() {
    try { const u = JSON.parse(sessionStorage.getItem('novus1730_user')); return u && u.role === 'admin'; }
    catch(e) { return false; }
  }
  const isAdmin = checkAdmin();
  if (isAdmin) document.getElementById('main-body').classList.add('is-admin');

  // ─── CHANGED: load from Supabase ─────────────────────────────────────────
  async function loadData() {
    const { data, error } = await NovusDB.rules.getAll();
    if (error) { console.error(error); renderBoard(DEFAULT_RULES); return; }

    if (!data.length) {
      // Auto-seed defaults on first run (admin only)
      if (isAdmin) {
        for (const rule of DEFAULT_RULES) {
          await NovusDB.rules.add(rule);
        }
        loadData(); // reload after seeding
        return;
      }
      renderBoard(DEFAULT_RULES);
      return;
    }

    renderBoard(data);
  }

  function renderBoard(items) {
    document.getElementById('board').innerHTML = items.map(item => {
      const displayText = item.text.replace(/^([^:]+:)/, '<strong>$1</strong>');
      return `
        <div class="pretty-card">
          <div class="card-body" contenteditable="${isAdmin}" onblur="editItem('${item.id}', this.innerText)">${displayText}</div>
          <div class="card-footer">
            <span>RULE • ${item.date}</span>
            ${isAdmin ? `<span class="delete-btn" onclick="deleteItem('${item.id}')">🗑️</span>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  // ─── CHANGED: write via Supabase ─────────────────────────────────────────
  async function addItem() {
    const text = prompt('New rule text:');
    if (!text) return;
    const { error } = await NovusDB.rules.add({
      id:   Date.now().toString(),
      text,
      date: new Date().toLocaleDateString(),
    });
    if (error) { alert('Failed to add rule.'); console.error(error); }
    // Real-time subscription reloads automatically
  }

  async function editItem(id, newText) {
    if (!isAdmin) return;
    const { error } = await NovusDB.rules.update(id, newText);
    if (error) console.error('Edit error', error);
  }

  async function deleteItem(id) {
    if (!confirm('Delete rule globally?')) return;
    const { error } = await NovusDB.rules.delete(id);
    if (error) console.error('Delete error', error);
    // Real-time subscription reloads automatically
  }

  window.onload = () => {
    NovusCore.requireAuth();
    loadData();
    NovusDB.rules.subscribe(() => loadData());
  };
</script>
</body>
</html>
