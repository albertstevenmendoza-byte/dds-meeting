<div class="page">
  <div class="page-top">
    <div>
      <h1 class="page-title">Needs Action Tracker<span class="sync-dot" id="sync-dot"></span></h1>
    </div>
    <button class="btn btn-primary" onclick="exportToExcel()">Export to Excel</button>
  </div>

  <div class="add-panel admin-only">
    <div class="add-panel-header">+ Add New Action Item</div>
    <div class="add-panel-body">
      <div class="add-grid">
        <div class="form-group"><label>Date</label><input type="date" id="new-date"/></div>
        <div class="form-group"><label>Description</label><input type="text" id="new-desc" placeholder="What needs to be done?"/></div>
        <div class="form-group"><label>Owner</label><input type="text" id="new-owner" placeholder="Name or Dept"/></div>
        <div style="display:flex;align-items:flex-end;"><button class="btn btn-primary" style="width:100%" onclick="addNewAction()">Add Item</button></div>
      </div>
    </div>
  </div>

  <div class="summary-row">
    <div class="summary-card"><div class="summary-label">Total Items</div><div class="summary-value" id="cnt-total">—</div></div>
    <div class="summary-card"><div class="summary-label">Open Items</div><div class="summary-value open" id="cnt-open">—</div></div>
    <div class="summary-card"><div class="summary-label">Completed</div><div class="summary-value done" id="cnt-done">—</div></div>
  </div>

  <div class="table-panel">
    <div class="table-panel-header">
      <span class="table-panel-title">Action Log</span>
      <button class="toggle-btn" id="toggle-btn" onclick="toggleVisibility()">Show Completed</button>
    </div>
    <div style="overflow-x:auto;">
      <table class="data-table" style="min-width:700px;">
        <thead><tr><th>Created</th><th>Description</th><th>Completed</th><th>Owner</th><th>Status</th><th style="text-align:center;">Mark</th></tr></thead>
        <tbody id="table-body"><tr><td colspan="6" style="text-align:center;padding:40px;color:var(--ink4);">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let allActions=[],isAdmin=false,showCompleted=false;
  function checkAdmin(){try{const u=JSON.parse(sessionStorage.getItem('novus1730_user'));isAdmin=u&&u.role==='admin';}catch(e){isAdmin=false;}if(isAdmin)document.getElementById('main-body').classList.add('is-admin');}
  function showSync(){document.getElementById('sync-dot').classList.add('on');}
  function hideSync(){setTimeout(()=>document.getElementById('sync-dot').classList.remove('on'),900);}

  async function loadData(){
    const{data,error}=await NovusDB.needsAction.getAll();
    if(error){console.error(error);return;}
    allActions=(data||[]).map(r=>({id:r.id,date:r.date,description:r.description,owner:r.owner,completedDate:r.completed_date}));
    renderUI();
  }

  function toggleVisibility(){
    showCompleted=!showCompleted;
    document.getElementById('toggle-btn').textContent=showCompleted?'Hide Completed':'Show Completed';
    renderUI();
  }

  function renderUI(){
    const openCount=allActions.filter(a=>!a.completedDate).length;
    document.getElementById('cnt-total').textContent=allActions.length;
    document.getElementById('cnt-open').textContent=openCount;
    document.getElementById('cnt-done').textContent=allActions.length-openCount;
    const display=showCompleted?allActions:allActions.filter(a=>!a.completedDate);
    const tbody=document.getElementById('table-body');
    if(!display.length){tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--ink4);">No ${showCompleted?'':'open'} actions found.</td></tr>`;return;}
    tbody.innerHTML=display.map(a=>{
      const done=!!(a.completedDate&&a.completedDate!=='');
      return`<tr>
        <td style="font-family:'DM Mono',monospace;font-size:.75rem;">${a.date}</td>
        <td class="${done?'strike':''}">${a.description}</td>
        <td style="font-family:'DM Mono',monospace;font-size:.75rem;">${a.completedDate||'—'}</td>
        <td class="owner-cell">${a.owner}</td>
        <td class="${done?'status-done':'status-open'}">${done?'Done':'Open'}</td>
        <td style="text-align:center;"><input type="checkbox" ${done?'checked':''} ${!isAdmin?'disabled':''} onchange="toggleAction('${a.id}',this.checked)" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer;"></td>
      </tr>`;
    }).join('');
  }

  async function addNewAction(){
    const date=document.getElementById('new-date').value,desc=document.getElementById('new-desc').value,owner=document.getElementById('new-owner').value;
    if(!date||!desc||!owner){alert('Fill all fields');return;}
    showSync();
    await NovusDB.needsAction.add({id:Date.now().toString(),date,description:desc,owner});
    document.getElementById('new-desc').value='';document.getElementById('new-owner').value='';
    hideSync();
  }

  async function toggleAction(id,checked){
    showSync();
    await NovusDB.needsAction.setCompleted(id,checked?new Date().toISOString().split('T')[0]:'');
    hideSync();
  }

  function exportToExcel(){
    if(typeof XLSX==='undefined'){alert('Excel library loading, please wait.');return;}
    const ws=XLSX.utils.json_to_sheet(allActions);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Needs Action Log');XLSX.writeFile(wb,'Novus_Needs_Action_Log.xlsx');
  }

  window.onload=()=>{
    NovusCore.requireAuth();checkAdmin();
    document.getElementById('new-date').value=new Date().toISOString().split('T')[0];
    loadData();
    NovusDB.needsAction.subscribe(()=>loadData());
  };
</script>
