<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Needs Action – Novus Foods Ops Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500&family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="novus-styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script async src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="novus-core.js"></script>
  <style>
    .page { padding-top:24px; }
    .page-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
    .page-title { font-size:1.75rem; font-weight:800; color:var(--ink); letter-spacing:-.03em; }
    .sync-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--green); margin-left:8px; opacity:0; transition:.3s; animation:pulse 1.5s infinite; }
    .sync-dot.on { opacity:1; }

    /* Summary cards */
    .summary-row { display:flex; gap:14px; margin-bottom:20px; }
    .summary-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:16px 20px; flex:1; box-shadow:var(--shadow-sm); }
    .summary-label { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--ink3); margin-bottom:6px; }
    .summary-value { font-size:2rem; font-weight:800; color:var(--ink); letter-spacing:-.03em; }
    .summary-value.open { color:var(--red-l); }
    .summary-value.done { color:var(--green); }

    /* Add form panel */
    .add-panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:18px; overflow:hidden; box-shadow:var(--shadow-sm); }
    .add-panel-header { background:linear-gradient(135deg,var(--green-xll),var(--green-ll)); border-bottom:1.5px solid #a7f3d0; padding:11px 18px; font-weight:800; font-size:.88rem; color:var(--green-d); }
    .add-panel-body { padding:18px; }
    .add-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; }

    /* Table panel */
    .table-panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow-sm); }
    .table-panel-header { background:linear-gradient(135deg,var(--green-xll),var(--green-ll)); border-bottom:1.5px solid #a7f3d0; padding:11px 18px; display:flex; justify-content:space-between; align-items:center; }
    .table-panel-title { font-weight:800; font-size:.88rem; color:var(--green-d); }
    .toggle-btn { background:var(--green-xll); border:1px solid var(--green-ll); color:var(--green-d); padding:4px 12px; border-radius:6px; font-size:.72rem; font-weight:700; cursor:pointer; transition:.15s; }
    .toggle-btn:hover { background:var(--green-ll); }

    .data-table th { text-align:left; }
    .data-table td { text-align:left; }

    .status-open { font-weight:700; color:var(--red-l); }
    .status-done { font-weight:700; color:var(--green); }
    .strike { text-decoration:line-through; opacity:.45; }
    .owner-cell { font-weight:700; color:var(--green-d); }

    body:not(.is-admin) .admin-only { display:none !important; }
  </style>
</head>
<body id="main-body">
<!-- ══ COMMAND CENTER HEADER ══════════════════════════════════════════════ -->
<header class="cmd-header">
  <div class="cmd-left">
    <a href="dds-announcements.html">
      <img src="novus-logo.png" alt="Novus Foods" class="cmd-logo">
    </a>
    <div class="cmd-divider"></div>
    <nav class="cmd-nav">
    <a class="cmd-tab" href="dds-announcements.html">Announcements</a>
    <a class="cmd-tab" href="dds-dashboard.html">Dashboard</a>
    <a class="cmd-tab" href="staff-meeting-dashboard.html">Staff Meeting</a>
    <a class="cmd-tab" href="play-call.html">Play Call</a>
    <a class="cmd-tab active" href="needs-action.html">Needs Action</a>
    </nav>
  </div>
  <div class="cmd-right">
    <!-- ··· More menu -->
    <div class="cmd-more-wrap" id="more-wrap">
      <button class="btn-cmd-icon" id="btn-more" onclick="toggleMore(event)" title="More options">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
      </button>
      <div class="more-dropdown hidden" id="more-dropdown">
        <div class="sd-group-label">Quick Access</div>
        <button class="sd-item" onclick="NovusCore.showNeedsAction();closeMore()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Needs Action
        </button>
        <button class="sd-item" onclick="NovusCore.showRules();closeMore()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Rules of Engagement
        </button>
        <button class="sd-item" onclick="NovusCore.showCoreValues();closeMore()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Core Values
        </button>
        <button class="sd-item" onclick="NovusCore.showHelp();closeMore()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Help & FAQ
        </button>
        <div class="sd-divider"></div>
        <div class="sd-group-label">Session</div>
        <button class="sd-item sd-item-danger" onclick="NovusCore.logout()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </div>
  </div>
</header>


<div class="page">
  <div class="page-top">
    <div>
      <h1 class="page-title">Needs Action Tracker<span class="sync-dot" id="sync-dot"></span></h1>
    </div>
    <button class="btn btn-primary" onclick="exportToExcel()">Export to Excel</button>
  </div>

  <div class="add-panel admin-only">
    <div class="add-panel-header">+ Add New Action Item</div>
    <div class="add-panel-body">
      <div class="add-grid">
        <div class="form-group"><label>Date</label><input type="date" id="new-date"/></div>
        <div class="form-group"><label>Description</label><input type="text" id="new-desc" placeholder="What needs to be done?"/></div>
        <div class="form-group"><label>Owner</label><input type="text" id="new-owner" placeholder="Name or Dept"/></div>
        <div style="display:flex;align-items:flex-end;"><button class="btn btn-primary" style="width:100%" onclick="addNewAction()">Add Item</button></div>
      </div>
    </div>
  </div>

  <div class="summary-row">
    <div class="summary-card"><div class="summary-label">Total Items</div><div class="summary-value" id="cnt-total">—</div></div>
    <div class="summary-card"><div class="summary-label">Open Items</div><div class="summary-value open" id="cnt-open">—</div></div>
    <div class="summary-card"><div class="summary-label">Completed</div><div class="summary-value done" id="cnt-done">—</div></div>
  </div>

  <div class="table-panel">
    <div class="table-panel-header">
      <span class="table-panel-title">Action Log</span>
      <button class="toggle-btn" id="toggle-btn" onclick="toggleVisibility()">Show Completed</button>
    </div>
    <div style="overflow-x:auto;">
      <table class="data-table" style="min-width:700px;">
        <thead><tr><th>Created</th><th>Description</th><th>Completed</th><th>Owner</th><th>Status</th><th style="text-align:center;">Mark</th></tr></thead>
        <tbody id="table-body"><tr><td colspan="6" style="text-align:center;padding:40px;color:var(--ink4);">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let allActions=[],isAdmin=false,showCompleted=false;
  function checkAdmin(){try{const u=JSON.parse(sessionStorage.getItem('novus1730_user'));isAdmin=u&&u.role==='admin';}catch(e){isAdmin=false;}if(isAdmin)document.getElementById('main-body').classList.add('is-admin');}
  function showSync(){document.getElementById('sync-dot').classList.add('on');}
  function hideSync(){setTimeout(()=>document.getElementById('sync-dot').classList.remove('on'),900);}

  async function loadData(){
    const{data,error}=await NovusDB.needsAction.getAll();
    if(error){console.error(error);return;}
    allActions=(data||[]).map(r=>({id:r.id,date:r.date,description:r.description,owner:r.owner,completedDate:r.completed_date}));
    renderUI();
  }

  function toggleVisibility(){
    showCompleted=!showCompleted;
    document.getElementById('toggle-btn').textContent=showCompleted?'Hide Completed':'Show Completed';
    renderUI();
  }

  function renderUI(){
    const openCount=allActions.filter(a=>!a.completedDate).length;
    document.getElementById('cnt-total').textContent=allActions.length;
    document.getElementById('cnt-open').textContent=openCount;
    document.getElementById('cnt-done').textContent=allActions.length-openCount;
    const display=showCompleted?allActions:allActions.filter(a=>!a.completedDate);
    const tbody=document.getElementById('table-body');
    if(!display.length){tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--ink4);">No ${showCompleted?'':'open'} actions found.</td></tr>`;return;}
    tbody.innerHTML=display.map(a=>{
      const done=!!(a.completedDate&&a.completedDate!=='');
      return`<tr>
        <td style="font-family:'DM Mono',monospace;font-size:.75rem;">${a.date}</td>
        <td class="${done?'strike':''}">${a.description}</td>
        <td style="font-family:'DM Mono',monospace;font-size:.75rem;">${a.completedDate||'—'}</td>
        <td class="owner-cell">${a.owner}</td>
        <td class="${done?'status-done':'status-open'}">${done?'Done':'Open'}</td>
        <td style="text-align:center;"><input type="checkbox" ${done?'checked':''} ${!isAdmin?'disabled':''} onchange="toggleAction('${a.id}',this.checked)" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer;"></td>
      </tr>`;
    }).join('');
  }

  async function addNewAction(){
    const date=document.getElementById('new-date').value,desc=document.getElementById('new-desc').value,owner=document.getElementById('new-owner').value;
    if(!date||!desc||!owner){alert('Fill all fields');return;}
    showSync();
    await NovusDB.needsAction.add({id:Date.now().toString(),date,description:desc,owner});
    document.getElementById('new-desc').value='';document.getElementById('new-owner').value='';
    hideSync();
  }

  async function toggleAction(id,checked){
    showSync();
    await NovusDB.needsAction.setCompleted(id,checked?new Date().toISOString().split('T')[0]:'');
    hideSync();
  }

  function exportToExcel(){
    if(typeof XLSX==='undefined'){alert('Excel library loading, please wait.');return;}
    const ws=XLSX.utils.json_to_sheet(allActions);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Needs Action Log');XLSX.writeFile(wb,'Novus_Needs_Action_Log.xlsx');
  }

  window.onload=()=>{
    NovusCore.requireAuth();checkAdmin();
    document.getElementById('new-date').value=new Date().toISOString().split('T')[0];
    loadData();
    NovusDB.needsAction.subscribe(()=>loadData());
  };
</script>
</body>
</html>
