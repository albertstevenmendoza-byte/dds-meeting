<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Needs Action – Novus Foods Ops Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="novus-core.js"></script>

  <style>
    :root{--bg:#f4f6fb;--surface:#fff;--border:#e2e8f0;--ink:#0f172a;--blue:#2563eb;--green:#059669;--red:#dc2626;--radius:14px;}
    body{font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); margin:0;}
    .top-nav{height:64px; background:white; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; padding:0 28px; position:sticky; top:0; z-index:1000;}
    .logo{font-weight:700;} .logo span{color:var(--blue);}
    .nav-tabs{display:flex; gap:2px; background:#f1f5f9; padding:4px; border-radius:10px;}
    .nav-tab{color:#64748b; text-decoration:none; font-weight:500; font-size:.82rem; padding:6px 14px; border-radius:7px;}
    .nav-tab.active{background:white; color:var(--blue); box-shadow:0 1px 4px rgba(0,0,0,.08);}
    .page{max-width:1600px; margin:0 auto; padding:40px 20px;}
    .btn{display:inline-flex; align-items:center; gap:6px; padding:10px 18px; border-radius:8px; font-size:.82rem; font-weight:600; cursor:pointer; border:none;}
    .btn-brand{background:var(--blue); color:white;}
    .panel{background:white; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:16px;}
    .panel-header{background:linear-gradient(135deg,var(--blue),#3b82f6); padding:12px 16px; color:white; font-weight:700; font-size:.85rem; text-transform:uppercase; display:flex; justify-content:space-between; align-items:center;}
    .panel-body{padding:20px;}
    .filter-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px;}
    .form-group label{display:block; font-size:.7rem; font-weight:700; text-transform:uppercase; color:#64748b; margin-bottom:6px;}
    select, input{width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:.84rem;}
    .metric-row{display:flex; gap:12px; margin-bottom:20px;}
    .metric-box{background:#f8fafc; border:1px solid var(--border); border-radius:12px; padding:15px; flex:1; text-align:center;}
    .metric-label{font-size:.65rem; font-weight:700; text-transform:uppercase; color:#64748b; margin-bottom:5px; letter-spacing:.06em;}
    .metric-value{font-size:1.8rem; font-weight:800;}
    .data-table{width:100%; border-collapse:collapse; font-size:.85rem;}
    .data-table th{background:#f1f5f9; color:var(--blue); font-weight:700; padding:12px; text-align:left; border-bottom:2px solid var(--blue);}
    .data-table td{padding:12px; border-bottom:1px solid var(--border);}
    #sync-indicator{font-size:0.7rem; color:var(--blue); font-weight:700; opacity:0; transition:0.3s;}
    #sync-indicator.active{opacity:1;}
    body:not(.is-admin) .admin-only{display:none !important;}
    .view-toggle{background:rgba(255,255,255,0.2); padding:4px 10px; border-radius:6px; font-size:0.7rem; cursor:pointer; border:1px solid rgba(255,255,255,0.3); color:white;}
  </style>
</head>
<body id="main-body">

<div class="top-nav">
  <div class="logo">Novus <span>Foods</span> Ops</div>
  <nav class="nav-tabs">
    <a class="nav-tab" href="dds-announcements.html">DDS Announcements</a>
    <a class="nav-tab" href="dds-dashboard.html">DDS Dashboard</a>
    <a class="nav-tab" href="dds-rules.html">Rules of Engagement</a>
    <a class="nav-tab" href="dds-corevalues.html">Core Values</a>
    <a class="nav-tab" href="staff-meeting-dashboard.html">Customizable Dashboard</a>
    <a class="nav-tab" href="play-call.html">Play Call</a>
    <a class="nav-tab active" href="needs-action.html">Needs Action</a>
  </nav>
  <button class="btn" onclick="NovusCore.navigateTo('index.html')">Logout</button>
</div>

<div class="page">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
    <div>
      <h1 style="margin:0;">Needs Action Tracker</h1>
      <span id="sync-indicator">Syncing to Cloud...</span>
    </div>
    <button class="btn btn-brand" onclick="exportToExcel()">Export to Excel</button>
  </div>

  <div class="panel admin-only">
    <div class="panel-header">Add New Action Item</div>
    <div class="panel-body">
      <div class="filter-grid">
        <div class="form-group"><label>Date</label><input type="date" id="new-date"></div>
        <div class="form-group"><label>Description</label><input type="text" id="new-desc" placeholder="What needs to be done?"></div>
        <div class="form-group"><label>Owner</label><input type="text" id="new-owner" placeholder="Name or Dept"></div>
        <div class="form-group" style="display:flex; align-items:flex-end;">
          <button class="btn btn-brand" style="width:100%" onclick="addNewAction()">Add Item</button>
        </div>
      </div>
    </div>
  </div>

  <div class="metric-row">
    <div class="metric-box"><div class="metric-label">Total Items</div><div class="metric-value" id="count-total">—</div></div>
    <div class="metric-box"><div class="metric-label">Open Items</div><div class="metric-value" style="color:var(--red)" id="count-open">—</div></div>
    <div class="metric-box"><div class="metric-label">Completed</div><div class="metric-value" style="color:var(--green)" id="count-comp">—</div></div>
  </div>

  <div class="panel">
    <div class="panel-header">
      Action Log
      <button class="view-toggle" id="toggle-view" onclick="toggleVisibility()">Show Completed Actions</button>
    </div>
    <div class="panel-body" style="padding:0;">
      <table class="data-table">
        <thead>
          <tr><th>Created</th><th>Description</th><th>Completed</th><th>Owner</th><th>Status</th><th>Mark</th></tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="6" style="text-align:center;padding:40px;color:#94a3b8;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let allActions = [];
  let isAdmin = false;
  let showCompleted = false;

  function checkAdmin() {
    try { const u = JSON.parse(sessionStorage.getItem('novus1730_user')); isAdmin = u && u.role === 'admin'; }
    catch(e) { isAdmin = false; }
    if (isAdmin) document.getElementById('main-body').classList.add('is-admin');
  }

  function showSync() { document.getElementById('sync-indicator').classList.add('active'); }
  function hideSync() { setTimeout(() => document.getElementById('sync-indicator').classList.remove('active'), 800); }

  // ─── CHANGED: load from Supabase ─────────────────────────────────────────
  async function loadData() {
    const { data, error } = await NovusDB.needsAction.getAll();
    if (error) { console.error(error); return; }
    // Normalize column names: Supabase uses snake_case, original used camelCase
    allActions = (data || []).map(r => ({
      id:             r.id,
      date:           r.date,
      description:    r.description,
      owner:          r.owner,
      completedDate:  r.completed_date,
    }));
    renderUI();
  }

  function toggleVisibility() {
    showCompleted = !showCompleted;
    document.getElementById('toggle-view').textContent = showCompleted ? 'Hide Completed Actions' : 'Show Completed Actions';
    renderUI();
  }

  function renderUI() {
    const openCount = allActions.filter(a => !a.completedDate).length;
    document.getElementById('count-total').textContent = allActions.length;
    document.getElementById('count-open').textContent = openCount;
    document.getElementById('count-comp').textContent = allActions.length - openCount;

    const display = showCompleted ? allActions : allActions.filter(a => !a.completedDate);
    const tbody = document.getElementById('table-body');

    if (!display.length) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:#94a3b8;">No ${showCompleted?'':'open'} actions found.</td></tr>`;
      return;
    }

    tbody.innerHTML = display.map(a => {
      const isDone = a.completedDate && a.completedDate !== '';
      return `<tr>
        <td style="font-family:monospace;font-size:0.8rem;">${a.date}</td>
        <td style="${isDone?'text-decoration:line-through;opacity:0.5':''}">${a.description}</td>
        <td style="font-family:monospace;font-size:0.8rem;">${a.completedDate || '—'}</td>
        <td style="font-weight:700;color:var(--blue)">${a.owner}</td>
        <td style="font-weight:700;color:${isDone?'var(--green)':'var(--red)'}">${isDone?'Done':'Open'}</td>
        <td><input type="checkbox" ${isDone?'checked':''} ${!isAdmin?'disabled':''} onchange="toggleAction('${a.id}',this.checked)"></td>
      </tr>`;
    }).join('');
  }

  // ─── CHANGED: write via Supabase ─────────────────────────────────────────
  async function addNewAction() {
    const date  = document.getElementById('new-date').value;
    const desc  = document.getElementById('new-desc').value;
    const owner = document.getElementById('new-owner').value;
    if (!date || !desc || !owner) { alert('Fill all fields'); return; }

    showSync();
    const { error } = await NovusDB.needsAction.add({
      id: Date.now().toString(), date, description: desc, owner,
    });
    if (error) { alert('Failed to save.'); console.error(error); }
    else { document.getElementById('new-desc').value = ''; document.getElementById('new-owner').value = ''; }
    hideSync();
    // Real-time subscription reloads automatically
  }

  async function toggleAction(id, isChecked) {
    showSync();
    const val = isChecked ? new Date().toISOString().split('T')[0] : '';
    const { error } = await NovusDB.needsAction.setCompleted(id, val);
    if (error) console.error('Toggle error', error);
    hideSync();
    // Real-time subscription reloads automatically
  }

  function exportToExcel() {
    const ws = XLSX.utils.json_to_sheet(allActions);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Needs Action Log');
    XLSX.writeFile(wb, 'Novus_Needs_Action_Log.xlsx');
  }

  window.onload = () => {
    NovusCore.requireAuth();
    checkAdmin();
    document.getElementById('new-date').value = new Date().toISOString().split('T')[0];
    loadData();
    NovusDB.needsAction.subscribe(() => loadData());
  };
</script>
</body>
</html>
