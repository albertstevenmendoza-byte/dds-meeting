.playcall-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:18px; }

/* Manager panel */
.manager-panel {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden;
  box-shadow:var(--shadow-sm);
  display:flex; flex-direction:column;
  transition:box-shadow .2s,border-color .2s;
}
.manager-panel:hover { box-shadow:var(--shadow); border-color:var(--green-ll); }

.manager-header {
  background:linear-gradient(135deg,var(--green-xll),var(--green-ll));
  border-bottom:1.5px solid #a7f3d0;
  padding:11px 18px;
}
.manager-name { font-weight:800; font-size:.95rem; color:var(--green-d); }

.task-input-wrap { padding:11px 14px; background:var(--surface2); border-bottom:1px solid var(--border); }
.task-input {
  width:100%; padding:10px 14px;
  border:1.5px solid var(--border); border-radius:var(--radius-sm);
  font-family:inherit; font-size:.88rem; color:var(--ink);
  background:var(--surface); outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.task-input:focus { border-color:var(--green); box-shadow:0 0 0 3px var(--green-glow); }

.task-list { padding:6px 0; min-height:70px; display:flex; flex-direction:column; }
.empty-state { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; text-align:center; color:var(--ink4); font-size:.82rem; font-style:italic; }

.task-item {
  display:flex; align-items:flex-start; gap:12px;
  padding:12px 16px; border-bottom:1px solid var(--border);
  transition:all .35s var(--ease); background:var(--surface);
}
.task-item:last-child { border-bottom:none; }
.task-item:hover { background:var(--green-xll); }
.task-item.removing { opacity:0; transform:translateX(30px); }

.checkbox-btn {
  width:22px; height:22px; border-radius:6px;
  border:2px solid var(--border2);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; background:var(--surface);
  transition:border-color .15s,background .15s;
}
.checkbox-btn:hover { border-color:var(--green); background:var(--green-xll); }
.checkbox-btn svg { width:13px; height:13px; fill:none; stroke:var(--green-d); stroke-width:3; }

.task-text { font-size:.9rem; color:var(--ink2); line-height:1.5; flex:1; font-weight:500; }

<div class="page">
  <div class="page-top">
    <h1 class="page-title">Daily Play Call</h1>
    <div class="sync-meta">
      <span id="sync-status">Connecting…</span>
      <button class="btn btn-ghost" style="font-size:.72rem;padding:5px 11px;" onclick="fetchData()">↺ Refresh</button>
    </div>
  </div>
  <div class="playcall-grid" id="main-grid"></div>
</div>

<script>
  const MANAGERS=[
    {name:'Production: Hector',webhook:''},
    {name:'QA: Cristian',webhook:'https://default56b8cda7546e49b1ab41957d6fafac.dd.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/3330a334c6e340e9ab750cb4a1b9702b/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=9BdUCDaZe7dhLNatV69lY-ZRPPe8qYvKIFfxJ20oO00'},
    {name:'Warehouse: Carl',webhook:'https://default56b8cda7546e49b1ab41957d6fafac.dd.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/32e270c28aa74b1bbee4588d4ab2a6e3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=vItsJFg2BsGJxTkZwA4GOUb4EMemCrpX5l0IGwe-YZs'},
    {name:'Maintenance: Mauricio',webhook:'https://default56b8cda7546e49b1ab41957d6fafac.dd.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/3ecd57b9d8c74c14a60fa474d3a05117/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=e_NGMAjZLA48_994qgnITGCqx083usTtSr_bjKfzIUs'},
    {name:'HR: Vanessa',webhook:''},
    {name:'Inventory Control: Albert',webhook:'https://default56b8cda7546e49b1ab41957d6fafac.dd.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a32d55cc566d4897ad4934189492cea0/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=ehXMfQLr6N94l8tYdGN7zqxSN4Fagu310qRNgTdeNJw'},
  ];

  let taskData=[];

  function initGrid(){
    document.getElementById('main-grid').innerHTML=MANAGERS.map(mgr=>{
      const sid=mgr.name.replace(/\s+/g,'');
      return`<div class="manager-panel">
        <div class="manager-header"><div class="manager-name">${mgr.name}</div></div>
        <div class="task-input-wrap">
          <input type="text" class="task-input" id="input-${sid}" placeholder="Assign a play…" onkeydown="if(event.key==='Enter')addTask('${mgr.name}',this)">
        </div>
        <div class="task-list" id="list-${sid}"><div class="empty-state">Loading plays…</div></div>
      </div>`;
    }).join('');
  }

  function render(){
    MANAGERS.forEach(mgr=>{
      const sid=mgr.name.replace(/\s+/g,'');
      const container=document.getElementById(`list-${sid}`);if(!container)return;
      const mgrTasks=taskData.filter(t=>t.owner===mgr.name);
      if(!mgrTasks.length){container.innerHTML='<div class="empty-state">No active plays.</div>';return;}
      container.innerHTML=mgrTasks.map(task=>`
        <div class="task-item" id="task-${task.id}">
          <button class="checkbox-btn" onclick="completeTask('${task.id}',this)" title="Mark complete">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <div class="task-text">${task.text}</div>
        </div>`).join('');
    });
  }

  async function fetchData(){
    const status=document.getElementById('sync-status');status.textContent='Syncing…';
    const{data,error}=await NovusDB.playCall.getAll();
    if(error){status.textContent='Error';console.error(error);return;}
    taskData=data||[];
    try{localStorage.setItem('novus_playcall_cache',JSON.stringify(taskData));}catch(_){}
    render();
    status.textContent=`Synced ${new Date().toLocaleTimeString()}`;
  }

  async function addTask(managerName,input){
    const text=input.value.trim();if(!text)return;
    const mgr=MANAGERS.find(m=>m.name===managerName);
    const id=Date.now().toString();
    input.value='';
    taskData.push({id,owner:managerName,text});render();
    const{error}=await NovusDB.playCall.add({id,owner:managerName,text,webhook:mgr?.webhook||'',date:new Date().toLocaleString()});
    if(error){console.error(error);taskData=taskData.filter(t=>t.id!==id);render();}
    else if(mgr?.webhook)fetch(mgr.webhook,{method:'POST',mode:'no-cors',body:JSON.stringify({task:text,owner:managerName})}).catch(()=>{});
  }

  async function completeTask(id,btn){
    const row=document.getElementById(`task-${id}`);
    if(row){btn.style.background='var(--green-ll)';btn.style.borderColor='var(--green)';row.classList.add('removing');setTimeout(()=>{taskData=taskData.filter(t=>t.id!==id);render();},380);}
    await NovusDB.playCall.delete(id);
  }

  window.onload=()=>{
    NovusCore.requireAuth();initGrid();
    try{const c=localStorage.getItem('novus_playcall_cache');if(c){taskData=JSON.parse(c);render();}}catch(_){}
    fetchData();
    NovusDB.playCall.subscribe(()=>fetchData());
  };
</script>
